          - paragraph [ref=e34]: Mission
        - heading "What we are committed to." [level=2] [ref=e35]
        - paragraph [ref=e36]: At Padres Con Poder, we are committed to empowering businesses across California to cultivate inclusive and neurodiverse-friendly workplaces. Through specialized coaching and training, we equip organizations to embrace diversity, equity, and inclusion, unlocking the potential of neurodiverse talent. Concurrently, we empower individuals with disabilities and their families to confidently navigate the Self-Determination Program.
