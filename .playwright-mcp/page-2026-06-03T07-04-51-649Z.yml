        - heading "What we are working toward." [level=2] [ref=e44]
        - paragraph [ref=e45]: Our vision is to be the leading resource for businesses and individuals across all regional centers in California. We aspire to create a society where every individual, regardless of ability, can lead an empowered and independent life — with person-centered planning at the forefront of service delivery.
