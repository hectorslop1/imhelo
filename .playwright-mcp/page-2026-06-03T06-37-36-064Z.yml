        - paragraph [ref=e36]: The Program
        - heading "What is the Self-Determination Program?" [level=2] [ref=e37]
      - paragraph [ref=e38]: The Self-Determination Program (SDP) is a California initiative that gives individuals with developmental disabilities and their families greater control over the services and supports they receive. Participants work with a Financial Management Service to manage their own budgets, choose their providers, and design a life plan that reflects their personal values and goals. Navigating it can be complex — Padres Con Poder is here to make every step clear.
